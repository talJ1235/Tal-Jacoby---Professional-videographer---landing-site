<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Heebo', 'Arial', sans-serif;
    background: #0a0a0a;
    color: #fff;
    position: relative;
    margin: 0;
    padding: 0;
  }

  /* Cinematic grain overlay */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.35;
    z-index: 1;
  }

  /* Background gradient — dark cinematic */
  .bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 80% at 20% 50%, rgba(180,140,60,0.12) 0%, transparent 65%),
      radial-gradient(ellipse 50% 60% at 80% 30%, rgba(180,140,60,0.07) 0%, transparent 60%),
      linear-gradient(135deg, #0d0d0d 0%, #111 40%, #0a0a0a 100%);
  }

  /* Gold horizontal line top */
  .line-top {
    position: absolute;
    top: 42px;
    left: 60px;
    right: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(196,160,80,0.6), rgba(196,160,80,0.9), rgba(196,160,80,0.6), transparent);
    z-index: 2;
  }

  /* Gold horizontal line bottom */
  .line-bottom {
    position: absolute;
    bottom: 42px;
    left: 60px;
    right: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(196,160,80,0.6), rgba(196,160,80,0.9), rgba(196,160,80,0.6), transparent);
    z-index: 2;
  }

  /* Corner accents */
  .corner {
    position: absolute;
    width: 28px;
    height: 28px;
    z-index: 2;
  }
  .corner-tl { top: 32px; right: 50px; border-top: 2px solid rgba(196,160,80,0.7); border-right: 2px solid rgba(196,160,80,0.7); }
  .corner-tr { top: 32px; left: 50px;  border-top: 2px solid rgba(196,160,80,0.7); border-left:  2px solid rgba(196,160,80,0.7); }
  .corner-bl { bottom: 32px; right: 50px; border-bottom: 2px solid rgba(196,160,80,0.7); border-right: 2px solid rgba(196,160,80,0.7); }
  .corner-br { bottom: 32px; left: 50px;  border-bottom: 2px solid rgba(196,160,80,0.7); border-left:  2px solid rgba(196,160,80,0.7); }

  /* Main content */
  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 3;
    gap: 0;
  }

  /* Camera aperture icon */
  .icon-wrap {
    margin-bottom: 22px;
  }
  .aperture {
    width: 58px;
    height: 58px;
    border: 2px solid rgba(196,160,80,0.55);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .aperture::before {
    content: '';
    position: absolute;
    width: 28px;
    height: 28px;
    border: 2px solid rgba(196,160,80,0.8);
    border-radius: 50%;
  }
  .aperture-dot {
    width: 8px;
    height: 8px;
    background: rgba(196,160,80,0.9);
    border-radius: 50%;
    position: absolute;
  }

  /* Name */
  .name {
    font-size: 88px;
    font-weight: 800;
    letter-spacing: 0.06em;
    color: #c4a050;
    line-height: 1;
    text-align: center;
    font-family: 'Heebo', 'Arial', sans-serif;
    text-shadow: 0 0 60px rgba(196,160,80,0.25), 0 2px 4px rgba(0,0,0,0.8);
  }

  /* Divider */
  .divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(196,160,80,0.7), transparent);
    margin: 20px auto;
  }

  /* Subtitle */
  .subtitle {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.22em;
    color: rgba(255,255,255,0.75);
    text-transform: uppercase;
    text-align: center;
    font-family: 'Heebo', Arial, sans-serif;
  }

  /* Services */
  .services {
    margin-top: 18px;
    display: flex;
    gap: 28px;
    align-items: center;
  }
  .service-dot {
    width: 4px;
    height: 4px;
    background: rgba(196,160,80,0.6);
    border-radius: 50%;
  }
  .service {
    font-size: 14px;
    font-weight: 500;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.15em;
    font-family: 'Heebo', Arial, sans-serif;
  }

  /* Domain */
  .domain {
    position: absolute;
    bottom: 58px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    color: rgba(196,160,80,0.5);
    letter-spacing: 0.2em;
    z-index: 3;
    font-family: 'Heebo', Arial, sans-serif;
  }

  /* Lens flare glow */
  .glow-left {
    position: absolute;
    top: 50%;
    right: -80px;
    transform: translateY(-50%);
    width: 500px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(196,160,80,0.06) 0%, transparent 65%);
    z-index: 2;
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="glow-left"></div>
  <div class="line-top"></div>
  <div class="line-bottom"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="content">
    <div class="icon-wrap">
      <div class="aperture">
        <div class="aperture-dot"></div>
      </div>
    </div>

    <div class="name">טל יעקבי</div>
    <div class="divider"></div>
    <div class="subtitle">צלם וידאו מקצועי</div>

    <div class="services">
      <span class="service">אירועים</span>
      <div class="service-dot"></div>
      <span class="service">סרטוני תדמית</span>
      <div class="service-dot"></div>
      <span class="service">נתניה והמרכז</span>
    </div>
  </div>

  <div class="domain">taljacoby.co.il</div>
</body>
</html>
